apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: elansarioumaima/soghani-chatbot-backend:latest
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GROQ_API_KEY
            - name: FLASK_ENV
              value: production
            - name: PORT
              value: "5000"
          ports:
            - containerPort: 5000